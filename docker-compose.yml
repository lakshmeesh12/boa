version: "3.9"

# ─────────────────────────────────────────────────────────────
# Target Banking Simulator — POC stack
#
#   mongo  → seeded core-banking datastore (single-node replica set: rs0)
#   api    → FastAPI Core Banking API (port 8000)
#   ui     → Static "Banking Agent Portal" served by nginx (port 8080)
#
#   All API logs are emitted to the shared `bank_logs` volume
#   mounted at /var/logs/bank-simulator (consumed by the AQE
#   testing framework).
# ─────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7.0
    container_name: bank-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok || quit(1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks: [bank-net]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/?replicaSet=rs0
      DATABASE_NAME: ${DATABASE_NAME}
      SERVICE_NAME: ${SERVICE_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_DIR: ${LOG_DIR}
      SIMULATED_LATENCY_MIN: ${SIMULATED_LATENCY_MIN}
      SIMULATED_LATENCY_MAX: ${SIMULATED_LATENCY_MAX}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP}
      SEED_CUSTOMER_COUNT: ${SEED_CUSTOMER_COUNT}
      SEED_RANDOM_SEED: ${SEED_RANDOM_SEED}
      DOCKER: "true"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - bank_logs:/var/logs/bank-simulator
    networks: [bank-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  ui:
    image: nginx:1.27-alpine
    container_name: bank-ui
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${UI_PORT:-8080}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [bank-net]

volumes:
  mongo_data:
  bank_logs:

networks:
  bank-net:
    driver: bridge
