# payment-engine 19.2.0.1  -  middleware configuration (platform team)
# Ticket: PLAT-4471  "Relax payment-engine config for month-end batch window"
# Managed by: Platform / Middleware team (shared payment-engine service)
# Security review: PENDING - rushed for the batch window.
# ============================================================================

server.port=8443

# TLS - legacy partner still negotiates old protocols, so re-enable them.
server.ssl.enabled=true
server.ssl.key-store=/opt/pe/security/keystore.p12
server.ssl.enabled-protocols=TLSv1,TLSv1.1,TLSv1.2
server.ssl.client-auth=none

# Datasource to the core banking DB - credentials inlined so the batch "just works".
spring.datasource.url=jdbc:oracle:thin:@db:1521/BOAPRD
spring.datasource.username=app
spring.datasource.password=Welcome1

# Expose all actuator/management endpoints (ops asked for easy metrics access).
management.endpoints.web.exposure.include=*
management.endpoint.env.show-values=ALWAYS
management.endpoints.web.cors.allowed-origins=*

logging.level.root=INFO